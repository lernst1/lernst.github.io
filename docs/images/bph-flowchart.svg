<svg xmlns="http://www.w3.org/2000/svg" width="560" viewBox="0 0 560 814" role="img">
<title>BPH project experimental flowchart</title>
<desc>A flowchart showing the experimental stages of the BPH gene cluster project from gene synthesis through final validation. Blue nodes show construct-building steps, amber nodes show functional assays, and purple nodes show CRISPR integration steps.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
<style>
text { font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; fill: #001F3F; }
.title { font-size: 14px; font-weight: 600; }
.sub { font-size: 12px; fill: #4a5568; }
.label { font-size: 11px; fill: #2C2C2A; }
.blue rect { fill: #E6F1FB; stroke: #185FA5; }
.blue text.title { fill: #0C447C; }
.amber rect { fill: #FAEEDA; stroke: #BA7517; }
.amber text.title { fill: #854F0B; }
.purple rect { fill: #EEEDFE; stroke: #534AB7; }
.purple text.title { fill: #3C3489; }
.callout rect { fill: none; stroke: #2C2C2A; stroke-dasharray: 4 3; }
.callout text { fill: #2C2C2A; font-weight: 600; }
</style>
</defs>

<g class="blue">
<rect x="130" y="30" width="300" height="56" rx="8" stroke-width="0.5"/>
<text class="title" x="280" y="53" text-anchor="middle" dominant-baseline="central">Gene synthesis</text>
<text class="sub" x="280" y="72" text-anchor="middle" dominant-baseline="central">6 BPH fragments via Twist Bioscience</text>
</g>
<line x1="280" y1="86" x2="280" y2="116" stroke="#888780" stroke-width="1" marker-end="url(#arrow)" fill="none"/>

<g class="blue">
<rect x="130" y="116" width="300" height="56" rx="8" stroke-width="0.5"/>
<text class="title" x="280" y="139" text-anchor="middle" dominant-baseline="central">PCR optimization</text>
<text class="sub" x="280" y="157" text-anchor="middle" dominant-baseline="central">Amplify all 6 fragments (5/6 complete)</text>
</g>
<line x1="280" y1="172" x2="280" y2="202" stroke="#888780" stroke-width="1" marker-end="url(#arrow)" fill="none"/>

<g class="blue">
<rect x="130" y="202" width="300" height="56" rx="8" stroke-width="0.5"/>
<text class="title" x="280" y="225" text-anchor="middle" dominant-baseline="central">Gibson Assembly</text>
<text class="sub" x="280" y="243" text-anchor="middle" dominant-baseline="central">Ligate fragments into pSHDY → BpSHDY</text>
</g>
<line x1="280" y1="258" x2="280" y2="288" stroke="#888780" stroke-width="1" marker-end="url(#arrow)" fill="none"/>

<g class="blue">
<rect x="130" y="288" width="300" height="56" rx="8" stroke-width="0.5"/>
<text class="title" x="280" y="311" text-anchor="middle" dominant-baseline="central">E. coli transformation</text>
<text class="sub" x="280" y="329" text-anchor="middle" dominant-baseline="central">Transform BpSHDY, confirm BPH function</text>
</g>
<line x1="280" y1="344" x2="280" y2="374" stroke="#888780" stroke-width="1" marker-end="url(#arrow)" fill="none"/>

<g class="amber">
<rect x="130" y="374" width="300" height="56" rx="8" stroke-width="0.5"/>
<text class="title" x="280" y="397" text-anchor="middle" dominant-baseline="central">PCB degradation assay</text>
<text class="sub" x="280" y="415" text-anchor="middle" dominant-baseline="central">Measure PCB levels in E. coli growth medium</text>
</g>
<line x1="280" y1="430" x2="280" y2="460" stroke="#888780" stroke-width="1" marker-end="url(#arrow)" fill="none"/>

<g class="blue">
<rect x="130" y="460" width="300" height="56" rx="8" stroke-width="0.5"/>
<text class="title" x="280" y="483" text-anchor="middle" dominant-baseline="central">M. aeruginosa transformation</text>
<text class="sub" x="280" y="501" text-anchor="middle" dominant-baseline="central">Transform BpSHDY into cyanobacteria</text>
</g>
<line x1="280" y1="516" x2="280" y2="546" stroke="#888780" stroke-width="1" marker-end="url(#arrow)" fill="none"/>

<g class="amber">
<rect x="130" y="546" width="300" height="56" rx="8" stroke-width="0.5"/>
<text class="title" x="280" y="569" text-anchor="middle" dominant-baseline="central">PCB degradation assay</text>
<text class="sub" x="280" y="587" text-anchor="middle" dominant-baseline="central">Confirm BPH function in cyanobacteria</text>
</g>
<line x1="280" y1="602" x2="280" y2="632" stroke="#888780" stroke-width="1" marker-end="url(#arrow)" fill="none"/>

<g class="purple">
<rect x="130" y="632" width="300" height="56" rx="8" stroke-width="0.5"/>
<text class="title" x="280" y="655" text-anchor="middle" dominant-baseline="central">Homologous recombination</text>
<text class="sub" x="280" y="673" text-anchor="middle" dominant-baseline="central">Knock out mcy gene, knock in BPH cluster</text>
</g>
<line x1="280" y1="688" x2="280" y2="718" stroke="#888780" stroke-width="1" marker-end="url(#arrow)" fill="none"/>

<g class="purple">
<rect x="130" y="718" width="300" height="56" rx="8" stroke-width="0.5"/>
<text class="title" x="280" y="741" text-anchor="middle" dominant-baseline="central">Final validation</text>
<text class="sub" x="280" y="759" text-anchor="middle" dominant-baseline="central">PCB assay + toxin suppression confirmation</text>
</g>

<g class="callout">
<rect x="6" y="118" width="108" height="28" rx="6" stroke-width="1"/>
<text class="label" x="60" y="132" text-anchor="middle" dominant-baseline="central">In progress</text>
</g>
<line x1="114" y1="132" x2="128" y2="144" stroke="#2C2C2A" stroke-width="0.5" stroke-dasharray="4 3" fill="none"/>

<g class="callout">
<rect x="6" y="376" width="108" height="28" rx="6" stroke-width="1"/>
<text class="label" x="60" y="390" text-anchor="middle" dominant-baseline="central">Upcoming</text>
</g>
<line x1="114" y1="390" x2="128" y2="395" stroke="#2C2C2A" stroke-width="0.5" stroke-dasharray="4 3" fill="none"/>

<!-- Legend: x=6 width=108 right-edge=114, matches callout right edge. Bottom=774 matches Final validation bottom -->
<rect x="6" y="698" width="108" height="76" rx="6" fill="none" stroke="#2C2C2A" stroke-width="0.8"/>
<rect x="12" y="706" width="10" height="10" rx="2" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text class="label" x="28" y="713" dominant-baseline="central">Construct</text>
<rect x="12" y="729" width="10" height="10" rx="2" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
<text class="label" x="28" y="736" dominant-baseline="central">Assay</text>
<rect x="12" y="752" width="10" height="10" rx="2" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="label" x="28" y="759" dominant-baseline="central">CRISPR</text>

</svg>
